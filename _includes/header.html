<header>
  <div class="container" style="position:relative;">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
      <span class="theme-icon">☽</span>
    </button>
    <h1 class="site-title"><a href="{{ '/' | relative_url }}">Abdul's <span>Cryptics</span></a></h1>
    <p class="site-tagline">{{ site.tagline }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Puzzles</a>
      <a href="{{ '/archive/' | relative_url }}" {% if page.url contains 'archive' %}class="active"{% endif %}>Archive</a>
      <a href="{{ '/notes/' | relative_url }}" {% if page.url contains 'notes' %}class="active"{% endif %}>Notes</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
    </nav>
  </div>
</header>

<script>
  const toggle = document.getElementById('themeToggle');
  const icon = toggle.querySelector('.theme-icon');

  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    icon.textContent = dark ? '☀' : '☽';
  }

  const saved = localStorage.getItem('theme');
  applyTheme(saved === 'dark');

  toggle.addEventListener('click', () => {
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  });
</script>
