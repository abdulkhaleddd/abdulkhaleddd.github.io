<header>
  <div class="container" style="position:relative;">

    <div class="theme-controls">
      <button class="theme-toggle" id="darkToggle" aria-label="Toggle dark mode" title="Toggle dark/light">
        <span class="theme-icon">☽</span>
      </button>
      <div class="palette-switcher" id="paletteSwitcher">
        <button class="swatch active" data-theme="parchment" title="Parchment" style="background:#f5efdf;"></button>
        <button class="swatch" data-theme="slate" title="Slate" style="background:#e8edf2;"></button>
        <button class="swatch" data-theme="forest" title="Forest" style="background:#eef2eb;"></button>
        <button class="swatch" data-theme="noir" title="Noir" style="background:#1a1a1a;border:1px solid #444;"></button>
      </div>
    </div>

    <h1 class="site-title"><a href="{{ '/' | relative_url }}">Abdul's <span>Cryptics</span></a></h1>
    <p class="site-tagline">{{ site.tagline }}</p>
    <nav>
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Puzzles</a>
      <a href="{{ '/archive/' | relative_url }}" {% if page.url contains 'archive' %}class="active"{% endif %}>Archive</a>
      <a href="{{ '/notes/' | relative_url }}" {% if page.url contains 'notes' %}class="active"{% endif %}>Notes</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
    </nav>
  </div>
</header>

<script>
(function() {
  const themes = {
    parchment: {
      light: {
        '--paper':        '#f5efdf',
        '--paper-dark':   '#ede4cc',
        '--paper-darker': '#d9cdb0',
        '--ink':          '#1c1208',
        '--ink-light':    '#3d2e10',
        '--ink-faint':    '#7a6640',
        '--accent':       '#8b1a1a',
        '--sepia':        '#a0845c',
        '--sepia-light':  '#c4a97d',
        '--rule':         '#c4a97d',
      },
      dark: {
        '--paper':        '#1c1710',
        '--paper-dark':   '#252018',
        '--paper-darker': '#332b1e',
        '--ink':          '#f0e6cc',
        '--ink-light':    '#d4c4a0',
        '--ink-faint':    '#8a7655',
        '--accent':       '#d4845a',
        '--sepia':        '#9a7e58',
        '--sepia-light':  '#5a4a30',
        '--rule':         '#4a3c28',
      }
    },
    slate: {
      light: {
        '--paper':        '#e8edf2',
        '--paper-dark':   '#dae0e8',
        '--paper-darker': '#c8d0da',
        '--ink':          '#0f1923',
        '--ink-light':    '#2a3a4a',
        '--ink-faint':    '#607080',
        '--accent':       '#1a5276',
        '--sepia':        '#4a6070',
        '--sepia-light':  '#8aa0b0',
        '--rule':         '#9ab0c0',
      },
      dark: {
        '--paper':        '#0f1923',
        '--paper-dark':   '#162030',
        '--paper-darker': '#1e2d3e',
        '--ink':          '#dce8f0',
        '--ink-light':    '#b0c8d8',
        '--ink-faint':    '#607888',
        '--accent':       '#5ba3cc',
        '--sepia':        '#4a6878',
        '--sepia-light':  '#2a3e50',
        '--rule':         '#2a3e50',
      }
    },
    forest: {
      light: {
        '--paper':        '#eef2eb',
        '--paper-dark':   '#e2e8dc',
        '--paper-darker': '#ccd6c4',
        '--ink':          '#0e1a10',
        '--ink-light':    '#243a28',
        '--ink-faint':    '#5a7060',
        '--accent':       '#2d6a3f',
        '--sepia':        '#5a7a50',
        '--sepia-light':  '#96b08a',
        '--rule':         '#a0b898',
      },
      dark: {
        '--paper':        '#0e1a10',
        '--paper-dark':   '#142018',
        '--paper-darker': '#1c2e20',
        '--ink':          '#dceede',
        '--ink-light':    '#b0ccb4',
        '--ink-faint':    '#5a7860',
        '--accent':       '#6abf7e',
        '--sepia':        '#4a6a50',
        '--sepia-light':  '#2a3e2c',
        '--rule':         '#2a3e2c',
      }
    },
    noir: {
      light: {
        '--paper':        '#f2f0ec',
        '--paper-dark':   '#e8e4dc',
        '--paper-darker': '#d4cec4',
        '--ink':          '#111111',
        '--ink-light':    '#2a2a2a',
        '--ink-faint':    '#666666',
        '--accent':       '#111111',
        '--sepia':        '#555555',
        '--sepia-light':  '#999999',
        '--rule':         '#aaaaaa',
      },
      dark: {
        '--paper':        '#111111',
        '--paper-dark':   '#1a1a1a',
        '--paper-darker': '#242424',
        '--ink':          '#f0ece4',
        '--ink-light':    '#d0ccc4',
        '--ink-faint':    '#888880',
        '--accent':       '#e8e0d0',
        '--sepia':        '#666660',
        '--sepia-light':  '#333330',
        '--rule':         '#333330',
      }
    }
  };

  function applyTheme(palette, dark) {
    const vars = themes[palette][dark ? 'dark' : 'light'];
    const root = document.documentElement;
    for (const [k, v] of Object.entries(vars)) root.style.setProperty(k, v);
    document.body.classList.toggle('dark', dark);
    const icon = document.querySelector('.theme-icon');
    if (icon) icon.textContent = dark ? '☀' : '☽';
    document.querySelectorAll('.swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.theme === palette);
    });
  }

  const savedPalette = localStorage.getItem('palette') || 'parchment';
  const savedDark    = localStorage.getItem('dark') === 'true';
  applyTheme(savedPalette, savedDark);

  document.addEventListener('DOMContentLoaded', function() {
    const darkBtn = document.getElementById('darkToggle');
    if (darkBtn) {
      darkBtn.addEventListener('click', () => {
        const isDark = document.body.classList.contains('dark');
        const palette = localStorage.getItem('palette') || 'parchment';
        localStorage.setItem('dark', String(!isDark));
        applyTheme(palette, !isDark);
      });
    }

    document.querySelectorAll('.swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        const palette = swatch.dataset.theme;
        const isDark  = document.body.classList.contains('dark');
        localStorage.setItem('palette', palette);
        applyTheme(palette, isDark);
      });
    });
  });
})();
</script>
