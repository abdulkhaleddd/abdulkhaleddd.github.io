---
layout: default
title: "Daily Clue"
permalink: /daily/
---

<article class="post-card featured single-post">
  <div class="post-meta">
    Daily Clue &ensp;·&ensp; <span id="daily-date"></span>
  </div>

  <h1 class="post-title">Daily Clue</h1>

  <p class="daily-intro">A new cryptic clue every day. Can you solve it?</p>

  <div class="daily-widget">
    <div class="daily-clue-box">
      <p class="daily-clue-text" id="daily-clue"></p>
    </div>

    <div class="daily-boxes-area" id="daily-boxes-area"></div>

    <div class="daily-btn-row">
      <button class="daily-btn" id="daily-check" onclick="checkAnswer()">Check</button>
    </div>

    <div class="daily-feedback" id="daily-feedback"></div>

    <div class="daily-hint-section">
      <p class="daily-hint-label">Need a nudge?</p>
      <div class="daily-hint-buttons">
        <button class="daily-btn daily-btn-hint" onclick="showHint('definition')">Definition</button>
        <button class="daily-btn daily-btn-hint" onclick="showHint('indicator')">Indicator</button>
        <button class="daily-btn daily-btn-hint" onclick="showHint('fodder')">Fodder</button>
        <button class="daily-btn daily-btn-hint" id="letter-hint-btn" onclick="revealLetter()">Letter</button>
      </div>
      <div class="daily-hint-text" id="daily-hint-text"></div>
    </div>

    <div class="daily-reveal-row">
      <button class="daily-btn daily-btn-subtle" id="daily-reveal" onclick="revealAnswer()">Reveal answer</button>
      <button class="daily-btn daily-btn-subtle" id="daily-parsing" onclick="revealParsing()" style="display:none;">Show parsing</button>
    </div>

    <div class="daily-answer-box" id="daily-answer-box" style="display:none;">
      <div class="daily-answer" id="daily-answer"></div>
      <div class="daily-breakdown" id="daily-breakdown"></div>
    </div>
  </div>
</article>

<style>
  .daily-intro {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-faint);
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
  }

  .daily-widget {
    max-width: 560px;
    margin-bottom: 1rem;
  }

  .daily-clue-box {
    background: var(--paper-dark);
    border: 1px solid var(--paper-darker);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .daily-clue-text {
    font-family: 'Crimson Text', serif;
    font-size: 1.15rem;
    color: var(--ink);
    line-height: 1.5;
    margin: 0;
  }

  /* LETTER BOXES */
  .daily-boxes-area {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .daily-word-group {
    display: flex;
    gap: 0.25rem;
  }

  .daily-word-gap {
    width: 0.6rem;
  }

  .daily-hyphen {
    font-family: 'Crimson Text', serif;
    font-size: 1.2rem;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    padding: 0 0.1rem;
  }

  .daily-letter-box {
    width: 2.2rem;
    height: 2.6rem;
    border: 1px solid var(--paper-darker);
    background: var(--paper);
    text-align: center;
    font-family: 'Crimson Text', serif;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0;
    text-transform: uppercase;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    padding: 0;
    caret-color: var(--accent);
  }

  .daily-letter-box:focus {
    border-color: var(--sepia);
  }

  .daily-letter-box.given {
    border-color: var(--sepia-light);
    color: var(--sepia);
    background: var(--paper-dark);
  }

  .daily-letter-box.revealed {
    border-color: var(--sepia-light);
    color: var(--ink-faint);
    background: var(--paper-dark);
  }

  @media (max-width: 480px) {
    .daily-letter-box {
      width: 1.8rem;
      height: 2.2rem;
      font-size: 1rem;
    }
    .daily-word-gap { width: 0.4rem; }
  }

  .daily-btn-row {
    margin-bottom: 0.75rem;
  }

  .daily-btn {
    font-family: 'Crimson Text', serif;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    padding: 0.5rem 1.25rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  .daily-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .daily-btn-subtle {
    background: transparent;
    color: var(--ink-faint);
    border: 1px solid var(--paper-darker);
  }

  .daily-btn-subtle:hover {
    color: var(--paper);
  }

  /* HINT SECTION */
  .daily-hint-section {
    margin-bottom: 1.25rem;
    padding: 0.75rem 0;
    border-top: 1px dotted var(--paper-darker);
  }

  .daily-hint-label {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-faint);
    margin-bottom: 0.5rem;
  }

  .daily-hint-buttons {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-bottom: 0.6rem;
  }

  .daily-btn-hint {
    background: transparent;
    color: var(--ink-faint);
    border: 1px solid var(--paper-darker);
    padding: 0.35rem 0.9rem;
    font-size: 0.72rem;
  }

  .daily-btn-hint:hover {
    color: var(--paper);
  }

  .daily-btn-hint.active {
    border-color: var(--sepia);
    color: var(--sepia);
  }

  .daily-btn-hint.used-letter {
    border-color: var(--sepia-light);
    color: var(--sepia);
    opacity: 0.6;
    cursor: default;
  }

  .daily-btn-hint.used-letter:hover {
    background: transparent;
    color: var(--sepia);
  }

  .daily-hint-text {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink-light);
    line-height: 1.5;
    min-height: 1.4rem;
  }

  .daily-reveal-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .daily-feedback {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.92rem;
    min-height: 1.5rem;
    margin-bottom: 0.75rem;
  }

  .daily-feedback.correct {
    color: #4a7c4f;
  }

  .daily-feedback.incorrect {
    color: var(--accent);
  }

  .daily-answer-box {
    background: var(--paper-dark);
    border: 1px solid var(--paper-darker);
    padding: 1rem 1.25rem;
    margin-top: 0.5rem;
  }

  .daily-answer {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.15rem;
    color: var(--ink);
    letter-spacing: 0.05em;
    margin-bottom: 0.35rem;
  }

  .daily-breakdown {
    font-family: 'Crimson Text', serif;
    font-size: 0.9rem;
    color: var(--ink-faint);
    line-height: 1.5;
  }
</style>

<script>
  (function() {
    var clues = {{ site.data.daily_clues | jsonify }};

    var today = new Date();
    var epoch = new Date(2026, 2, 27); // March 27, 2026
    var dayIndex = Math.floor((today - epoch) / 86400000);
    var index = ((dayIndex % clues.length) + clues.length) % clues.length;
    var todayClue = clues[index];

    var letterInputs = [];
    var givenIndices = [];
    var answerLetters = todayClue.answer.replace(/[\s\-]/g, '').split('');

    // Display date
    var months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
    document.getElementById('daily-date').textContent =
      today.getDate() + ' ' + months[today.getMonth()] + ' ' + today.getFullYear();

    // Display clue
    document.getElementById('daily-clue').textContent = todayClue.clue;

    // Parse enumeration to build boxes
    function buildBoxes() {
      var area = document.getElementById('daily-boxes-area');
      var enumStr = todayClue.enumeration.replace(/[()]/g, '');
      var parts = enumStr.split(/([,\-])/);

      var globalIndex = 0;

      parts.forEach(function(part) {
        if (part === ',') {
          var gap = document.createElement('div');
          gap.className = 'daily-word-gap';
          area.appendChild(gap);
        } else if (part === '-') {
          var hyph = document.createElement('div');
          hyph.className = 'daily-hyphen';
          hyph.textContent = '–';
          area.appendChild(hyph);
        } else {
          var count = parseInt(part, 10);
          if (isNaN(count)) return;

          var group = document.createElement('div');
          group.className = 'daily-word-group';

          for (var j = 0; j < count; j++) {
            var inp = document.createElement('input');
            inp.type = 'text';
            inp.maxLength = 1;
            inp.className = 'daily-letter-box';
            inp.setAttribute('data-index', globalIndex);
            inp.autocomplete = 'off';
            inp.spellcheck = false;

            (function(idx) {
              inp.addEventListener('input', function() {
                var val = this.value.replace(/[^a-zA-Z]/g, '');
                this.value = val.toUpperCase();
                if (val && idx < letterInputs.length - 1) {
                  letterInputs[idx + 1].focus();
                }
              });

              inp.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && idx > 0) {
                  var prev = idx - 1;
                  while (prev >= 0 && givenIndices.indexOf(prev) !== -1) prev--;
                  if (prev >= 0) {
                    letterInputs[prev].focus();
                    letterInputs[prev].value = '';
                  }
                  e.preventDefault();
                }
                if (e.key === 'Enter') {
                  checkAnswer();
                }
                if (e.key === 'ArrowLeft' && idx > 0) {
                  letterInputs[idx - 1].focus();
                  e.preventDefault();
                }
                if (e.key === 'ArrowRight' && idx < letterInputs.length - 1) {
                  letterInputs[idx + 1].focus();
                  e.preventDefault();
                }
              });

              inp.addEventListener('focus', function() {
                this.select();
              });
            })(globalIndex);

            group.appendChild(inp);
            letterInputs.push(inp);
            globalIndex++;
          }

          area.appendChild(group);
        }
      });

      if (letterInputs.length > 0) {
        letterInputs[0].focus();
      }
    }

    buildBoxes();

    window.checkAnswer = function() {
      var feedback = document.getElementById('daily-feedback');
      var allFilled = letterInputs.every(function(inp) { return inp.value.length === 1; });

      if (!allFilled) {
        feedback.textContent = 'Fill in all the letters first.';
        feedback.className = 'daily-feedback incorrect';
        for (var i = 0; i < letterInputs.length; i++) {
          if (!letterInputs[i].value) { letterInputs[i].focus(); break; }
        }
        return;
      }

      var allCorrect = letterInputs.every(function(inp, i) {
        return inp.value.toUpperCase() === answerLetters[i].toUpperCase();
      });

      if (allCorrect) {
        feedback.textContent = 'Correct — well solved!';
        feedback.className = 'daily-feedback correct';
        letterInputs.forEach(function(inp) { inp.disabled = true; });
        showParsing();
      } else {
        feedback.textContent = 'Not quite — try again.';
        feedback.className = 'daily-feedback incorrect';
      }
    };

    window.showHint = function(type) {
      var hintText = document.getElementById('daily-hint-text');
      var label = type.charAt(0).toUpperCase() + type.slice(1);
      hintText.textContent = label + ': ' + todayClue.hints[type];

      // Highlight the active button, dim others
      var buttons = document.querySelectorAll('.daily-btn-hint:not(#letter-hint-btn)');
      buttons.forEach(function(btn) {
        if (btn.textContent.trim().toLowerCase() === type) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    };

    window.revealLetter = function() {
      var available = [];
      for (var i = 0; i < letterInputs.length; i++) {
        if (givenIndices.indexOf(i) === -1) {
          if (letterInputs[i].value.toUpperCase() !== answerLetters[i].toUpperCase()) {
            available.push(i);
          }
        }
      }

      if (available.length === 0) {
        document.getElementById('letter-hint-btn').classList.add('used-letter');
        return;
      }

      var pick = available[Math.floor(Math.random() * available.length)];
      letterInputs[pick].value = answerLetters[pick].toUpperCase();
      letterInputs[pick].classList.add('given');
      letterInputs[pick].disabled = true;
      givenIndices.push(pick);

      var remaining = [];
      for (var j = 0; j < letterInputs.length; j++) {
        if (givenIndices.indexOf(j) === -1) {
          if (letterInputs[j].value.toUpperCase() !== answerLetters[j].toUpperCase()) {
            remaining.push(j);
          }
        }
      }
      if (remaining.length === 0) {
        document.getElementById('letter-hint-btn').classList.add('used-letter');
      }
    };

    window.revealAnswer = function() {
      document.getElementById('daily-feedback').textContent = '';
      document.getElementById('daily-feedback').className = 'daily-feedback';

      letterInputs.forEach(function(inp, i) {
        inp.value = answerLetters[i].toUpperCase();
        inp.classList.remove('given');
        inp.classList.add('revealed');
        inp.disabled = true;
      });

      showParsing();
    };

    window.revealParsing = function() {
      document.getElementById('daily-breakdown').style.display = 'block';
      document.getElementById('daily-parsing').style.display = 'none';
    };

    function showParsing() {
      document.getElementById('daily-answer-box').style.display = 'block';
      document.getElementById('daily-answer').textContent = todayClue.answer;
      document.getElementById('daily-breakdown').textContent = todayClue.breakdown;
      document.getElementById('daily-breakdown').style.display = 'none';
      document.getElementById('daily-parsing').style.display = 'inline-block';
      document.getElementById('daily-reveal').style.display = 'none';
    }
  })();
</script>
