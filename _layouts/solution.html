---
layout: default
---

<article class="post-card featured single-post">
  <div class="post-meta">
    Solutions &ensp;·&ensp; No. {{ page.number }} &ensp;·&ensp; {{ page.date | date: "%B %Y" }}
  </div>

  <h1 class="post-title">{{ page.title }} — Solutions</h1>

  <div class="spoiler-warning">
    ⚠ Full annotations below. Only read on if you've finished the puzzle or need help.
  </div>

  <div class="solutions-body">
    {{ content }}
  </div>

  <div class="post-nav">
    <a href="{{ '/puzzles/' | append: page.puzzle_slug | relative_url }}" class="read-more">← Back to puzzle</a>
  </div>
  <div class="comments-section">
  <div class="section-label" style="margin-top:2rem;">Comments</div>
  <script async src="https://talk.hyvor.com/embed/embed.js" type="module"></script>
  <hyvor-talk-comments
    website-id="15160"
    page-id="{{ page.url | absolute_url }}"
  ></hyvor-talk-comments>
</div>
</article>
```
