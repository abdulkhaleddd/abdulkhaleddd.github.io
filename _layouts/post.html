---
layout: default
---

<article class="post-card single-post">
  <div class="post-meta">
    {{ page.date | date: "%d %B %Y" }}
    {% if page.tags %} &ensp;·&ensp;
      {% for tag in page.tags %}{{ tag }}{% unless forloop.last %}, {% endunless %}{% endfor %}
    {% endif %}
  </div>
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-body">
    {{ content }}
  </div>
</article>
